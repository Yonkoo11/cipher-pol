<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cipher Pol — Closing Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  background: #050508;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card {
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.wordmark {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 0.22em;
  color: #64748b;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 28px;
}

.diamond {
  color: #7c3aed;
  font-size: 20px;
}

.headline {
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 56px;
  font-weight: 700;
  line-height: 1.1;
  letter-spacing: -0.03em;
  color: #f1f5f9;
  margin-bottom: 36px;
}

.headline span {
  color: #8b5cf6;
}

.github {
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  font-weight: 400;
  color: #475569;
  letter-spacing: 0.04em;
  margin-bottom: 14px;
}

.hackathon {
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  font-weight: 500;
  letter-spacing: 0.16em;
  color: #475569;
  text-transform: uppercase;
  margin-top: 48px;
}
</style>
</head>
<body>
  <div class="card">
    <div class="wordmark">
      <span class="diamond">◈</span>
      CIPHER POL
    </div>
    <h1 class="headline">The payment went through.<br><span>The identity didn't.</span></h1>
    <p class="hackathon">PL_Genesis 2026</p>
  </div>
</body>
</html>
